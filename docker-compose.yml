services:
  bot:
    build: .
    container_name: quant-futures-bot
    env_file:
      - .env
    restart: always
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring:
    image: grafana/loki:2.9.8
    container_name: quant-monitoring
    restart: always
    ports:
      - "3100:3100"
